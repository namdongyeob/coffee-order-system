name: Harness Quality

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Harness unit tests
        run: python -m unittest discover -s scripts/tests -p "test_*.py"
      - name: Harness evidence gate
        env:
          ISSUE_BRANCH: ${{ github.head_ref }}
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > "$RUNNER_TEMP/pr-body.md"
          python scripts/harness_gate.py --branch "$ISSUE_BRANCH" --base-ref "$BASE_REF" --check-links --pr-body-file "$RUNNER_TEMP/pr-body.md"
      - name: Compile production Java
        run: ./gradlew compileJava --no-daemon
      - name: Run Gradle tests
        run: ./gradlew test --no-daemon
      - name: Check changed Markdown links
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: python scripts/harness_gate.py --links-only --base-ref "$BASE_REF"
